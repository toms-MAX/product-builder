<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중학교 영어 시험 도우미</title>
    <link rel="stylesheet" href="style.css">
    <!-- PDF libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div id="version-info" style="position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.6); color: white; padding: 3px 8px; border-radius: 4px; font-size: 11px; z-index: 9999; pointer-events: none;">
        Version 2.3.2
    </div>

    <div class="container main-container">
        <button id="theme-toggle">다크 모드</button>
        <h1>영어 시험 도우미</h1>

        <!-- API 키 설정 섹션 -->
        <div id="api-config" style="margin-bottom: 20px; padding: 15px; background: #f9f9f9; border-radius: 8px; border: 1px solid #ddd; text-align: left;">
            <label style="font-size: 0.85em; font-weight: bold; display: block; margin-bottom: 5px;">Groq API 키 설정</label>
            <div style="display: flex; gap: 10px;">
                <input type="password" id="api-key-input" placeholder="gsk_..." style="flex: 1; padding: 8px; font-size: 0.9em; border: 1px solid #ccc; border-radius: 4px;">
                <button id="save-key-btn" style="padding: 8px 15px; font-size: 0.85em; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 4px;">저장</button>
            </div>
            <p style="font-size: 0.75em; margin-top: 5px; color: #666;">* 키가 없으면 <a href="https://console.groq.com/keys" target="_blank" style="color: #3498db;">여기서</a> 새로 발급받으세요.</p>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="prediction">기출 예상문제</button>
            <button class="tab-btn" data-tab="question-bank">문제은행</button>
            <button class="tab-btn" data-tab="saved-list">문제 장바구니 (<span id="saved-count">0</span>)</button>
        </div>

        <!-- 기출 예상문제 탭 -->
        <div id="prediction" class="tab-content active">
            <p>분석할 지문을 입력하고 난이도와 문항 수를 설정하세요.</p>
            <div class="form-group">
                <label for="reading-material">영어 지문 입력</label>
                <textarea id="reading-material" placeholder="분석할 영어 지문을 붙여넣으세요..." style="height: 200px;"></textarea>
            </div>
            <div class="flex-row">
                <div class="form-group">
                    <label for="predict-level">난이도</label>
                    <select id="predict-level">
                        <option value="easy">쉬움 (중1 수준)</option>
                        <option value="medium" selected>보통 (중2~3 수준)</option>
                        <option value="hard">어려움 (고등 기초 수준)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="predict-count">문제 개수</label>
                    <input type="number" id="predict-count" min="1" max="10" value="5">
                </div>
            </div>
            <button id="generate-prediction" class="action-btn">예상문제 생성하기</button>
        </div>

        <!-- 문제은행 탭 -->
        <div id="question-bank" class="tab-content">
            <p>다양한 유형의 기본 문제를 생성합니다.</p>
            <div class="form-group">
                <label for="level-select">난이도</label>
                <select id="level-select">
                    <option value="easy">쉬움</option>
                    <option value="medium" selected>보통</option>
                    <option value="hard">어려움</option>
                </select>
            </div>
            <div class="form-group">
                <label for="topic-select">주제</label>
                <select id="topic-select">
                    <option value="grammar">문법</option>
                    <option value="vocabulary">어휘</option>
                    <option value="reading">독해</option>
                </select>
            </div>
            <div class="form-group">
                <label for="question-count">문제 개수</label>
                <input type="number" id="question-count" min="1" max="20" value="5">
            </div>
            <button id="generate-bank" class="action-btn">기본 문제 생성</button>
        </div>

        <!-- 문제 장바구니 탭 -->
        <div id="saved-list" class="tab-content">
            <p>선별된 문제들을 확인하고 PDF로 내려받으세요.</p>
            <div id="pdf-export-area" class="saved-questions-area" style="background: white; padding: 20px; color: black;">
                <div id="saved-questions-list">
                    <p class="empty-msg">아직 담은 문제가 없습니다.</p>
                </div>
            </div>
            <div class="flex-row" style="margin-top: 20px;">
                <button id="export-pdf" class="action-btn" style="flex: 2; background-image: linear-gradient(45deg, #2ecc71, #27ae60);">PDF 파일로 저장하기</button>
                <button id="clear-saved" class="secondary-btn" style="flex: 1; margin-top: 15px;">초기화</button>
            </div>
        </div>

        <div id="result-container" class="result-area">
            <h3>생성 결과</h3>
            <p style="font-size: 0.9em; color: var(--paragraph-color);">* 마음에 드는 문제 옆의 '담기' 버튼을 눌러보세요.</p>
            <div id="generated-questions"></div>
        </div>

        <div style="margin-top: 30px;">
            <a href="contact.html" class="nav-link">제휴 문의하기</a>
        </div>
    </div>
    <script src="main.js?v=2.3.2"></script>
</body>
</html>
