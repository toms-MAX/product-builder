<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중학교 영어 시험 도우미 - Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div id="version-info" style="position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.6); color: white; padding: 3px 8px; border-radius: 4px; font-size: 11px; z-index: 9999; pointer-events: none;">
        Version 2.8.8 (Advanced Vision Analysis)
    </div>

    <div class="container main-container">
        <button id="theme-toggle">다크 모드</button>
        <h1>영어 내신 문제 생성기 <span style="font-size: 0.5em; vertical-align: middle; color: #f1c40f;">SMART</span></h1>

        <div class="main-layout">
            <!-- 왼쪽: 내용 입력창 -->
            <div class="input-section">
                <h3>1. 시험 지문 입력</h3>
                <textarea id="reading-material" placeholder="시험에 나올 본문을 입력하세요..." style="height: 300px;"></textarea>
            </div>

            <!-- 오른쪽: 문제 형식 입력창 -->
            <div class="style-section">
                <h3>2. 문제 형식 (Logic Specs)</h3>
                
                <!-- JSON 로직 입력창 추가 -->
                <div class="logic-input-area" style="margin-bottom: 15px;">
                    <label style="font-size: 0.8em; font-weight: bold; color: #7f8c8d; display: block; margin-bottom: 5px;">연산 설계도 (JSON) 붙여넣기:</label>
                    <textarea id="logic-json-input" placeholder='ChatGPT가 생성한 JSON 코드를 여기에 붙여넣으세요...' style="height: 120px; font-family: monospace; font-size: 0.8em; width: 100%; border: 1px solid #ddd; border-radius: 4px; padding: 8px; box-sizing: border-box;"></textarea>
                </div>

                <div id="drop-zone" class="drop-zone" style="padding: 15px; font-size: 0.9em;">
                    또는 기출 PDF/JSON 파일을 드래그하세요.<br>
                    <input type="file" id="exam-file-input" accept="image/*,.pdf,.json" multiple style="display: none;">
                </div>
                <div id="selected-files-preview" class="file-list"></div>
                
                <div class="config-mini" style="margin-top: 15px; display: flex; gap: 10px; align-items: center;">
                    <label>난이도:</label>
                    <select id="predict-level">
                        <option value="easy">쉬움 (중1)</option>
                        <option value="medium" selected>보통 (중2~3)</option>
                        <option value="hard">어려움 (고등)</option>
                    </select>
                    <label>문항 수:</label>
                    <input type="number" id="predict-count" min="1" max="10" value="3" style="width: 50px; padding: 5px;">
                </div>
                
                <button id="generate-btn" class="action-btn" style="width: 100%; margin-top: 15px; font-size: 1.1em;">⚙️ 연산 회로 가동 (Compute)</button>
                
                <!-- 미세 연산 로그판 -->
                <div id="factory-status" class="factory-status" style="display: none; margin-top: 20px; text-align: left; padding: 15px; background: #000; color: #0f0; font-family: 'Courier New', monospace; font-size: 0.85em; border-radius: 4px; max-height: 250px; overflow-y: auto;">
                    <div id="compute-log"></div>
                </div>
            </div>
        </div>

        <!-- 결과 영역 -->
        <div id="result-container" class="result-area" style="margin-top: 30px;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px;">
                <h3>생성된 예상 문제</h3>
                <button id="export-pdf" class="secondary-btn" style="padding: 5px 15px;">PDF 저장</button>
            </div>
            <div id="generated-questions">
                <p class="empty-msg">지문과 형식을 입력한 후 버튼을 눌러주세요.</p>
            </div>
        </div>

        <!-- API 키 설정 (하단으로 이동) -->
        <details style="margin-top: 50px; opacity: 0.6;">
            <summary style="cursor: pointer; font-size: 0.9em;">API 설정 및 도움말</summary>
            <div id="api-config" style="padding: 15px; background: #f9f9f9; border-radius: 8px; border: 1px solid #ddd; margin-top: 10px; text-align: left;">
                <label style="font-size: 0.85em; font-weight: bold;">Groq API 키:</label>
                <div style="display: flex; gap: 10px; margin-top: 5px;">
                    <input type="password" id="api-key-input" placeholder="gsk_..." style="flex: 1; padding: 8px;">
                    <button id="save-key-btn" style="padding: 8px 15px;">저장</button>
                </div>
            </div>
        </details>
    </div>

        <div style="margin-top: 30px;">
            <a href="contact.html" class="nav-link">제휴 문의하기</a>
        </div>
    </div>
    <script src="main.js?v=2.8.8"></script>
</body>
</html>
