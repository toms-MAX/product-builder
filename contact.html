<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의 - 영어 시험 도우미</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle">다크 모드</button>
        <a href="index.html" class="nav-link">홈으로 돌아가기</a>
        <h1>제휴 문의</h1>
        <p>함께 성장할 파트너를 찾습니다.</p>
        
        <form action="https://formspree.io/f/xwvwbrzo" method="POST" id="contact-form">
            <div class="form-group">
                <label for="name">성함/기업명</label>
                <input type="text" id="name" name="name" required placeholder="홍길동">
            </div>
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" required placeholder="문의하실 내용을 입력해주세요."></textarea>
            </div>
            <button type="submit" id="generate-button">문의 보내기</button>
        </form>
    </div>
    <script src="main.js"></script>
</body>
</html>
